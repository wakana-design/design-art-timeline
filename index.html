
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デザインとアートの年表 | Timeline of Art & Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f5f1;
    --ink: #1b1a18;
    --ink-soft: #55524c;
    --line: #d8d5cd;
    --display: "Zen Old Mincho", serif;
    --body: "Zen Kaku Gothic New", sans-serif;
    --latin: "Cormorant Garamond", serif;

    /* 生まれ国の色（くすみ系で統一） */
    --c-it: #a0765a;
    --c-fr: #5f7490;
    --c-be: #8a6f85;
    --c-uk: #74815f;
    --c-de: #6b7a80;
    --c-es: #b3924f;
    --c-ee: #5f8f81;
    --c-jp: #a05a68;
    --c-us: #99605c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.8;
  }

  header {
    max-width: 860px;
    margin: 0 auto;
    padding: 64px 24px 24px;
    text-align: center;
  }
  .site-en {
    font-family: var(--latin);
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
  }
  h1 {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(28px, 5.5vw, 44px);
    letter-spacing: 0.12em;
    margin: 10px 0 18px;
  }
  .lede {
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 600px;
    margin: 0 auto;
  }

  /* 国別フィルター */
  .filters {
    display: flex;
    justify-content: center;
    gap: 6px 14px;
    flex-wrap: wrap;
    margin-top: 22px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .filters label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
  }
  .filters input { accent-color: var(--ink); }
  .filters .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--dot);
  }
  .note {
    margin-top: 10px;
    font-size: 11px;
    color: #b0aca0;
  }

  .chart-outer {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 48px 16px 0;
    overflow-x: auto; /* 画面幅が足りない場合の保険 */
  }
  .chart { position: relative; margin: 0 auto; }

  /* 年グリッドと中央の軸 */
  .gridline-h {
    position: absolute;
    height: 1px;
    background: #eceae3;
  }
  .gridline-h.major { background: var(--line); }
  .axis-strip {
    position: absolute;
    top: 0;
    bottom: 0;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    background: var(--paper);
  }
  .year-label {
    position: absolute;
    text-align: center;
    transform: translateY(-50%);
    font-family: var(--latin);
    font-size: 11px;
    letter-spacing: 0.04em;
    color: #b0aca0;
    background: var(--paper);
  }
  .year-label.major { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .now-line {
    position: absolute;
    border-top: 1px dashed var(--ink-soft);
  }
  .now-label {
    position: absolute;
    text-align: center;
    transform: translateY(-50%);
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    background: var(--paper);
  }

  /* グループヘッダー */
  .col-head {
    position: absolute;
    top: -42px;
    text-align: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.14em;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
  }
  .col-head.country {
    font-family: var(--body);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.02em;
  }

  /* 様式・運動タイル */
  .tile {
    position: absolute;
    background: #fffefb;
    border: 1px solid var(--line);
    cursor: pointer;
    padding: 0;
    text-align: left;
    font-family: var(--body);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    overflow: hidden;
  }
  .tile:hover { border-color: var(--ink-soft); box-shadow: 0 2px 10px rgba(27,26,24,0.08); }
  .tile:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .tile img {
    display: block;
    width: 100%;
    height: 84px;
    object-fit: cover;
    border-bottom: 1px solid var(--line);
  }
  .tile.noimg img { display: none; }
  .tile .t-name {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.02em;
    line-height: 1.45;
    padding: 9px 10px;
  }

  /* 人物バー */
  .p-bar {
    position: absolute;
    width: 9px;
    border-radius: 5px;
    opacity: 0.55;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .p-bar:hover { opacity: 0.85; }
  .p-bar:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .p-bar.living {
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30px);
    mask-image: linear-gradient(to bottom, transparent, #000 30px);
  }
  .p-label {
    position: absolute;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--ink);
    white-space: nowrap;
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* 詳細モーダル */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 26, 24, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fffefb;
    border: 1px solid var(--line);
    max-width: 520px;
    width: 100%;
    max-height: 84vh;
    overflow-y: auto;
    padding: 26px 30px 26px;
    position: relative;
  }
  .modal img.hero {
    display: block;
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    background: #f0efe9;
    margin-bottom: 18px;
  }
  .modal img.hero.hide { display: none; }
  .modal .head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .modal .nm {
    font-family: var(--display);
    font-weight: 700;
    font-size: 21px;
    letter-spacing: 0.06em;
  }
  .modal .en {
    font-family: var(--latin);
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .modal .period {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .modal .origin {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--line);
    padding-bottom: 2px;
  }
  .modal .origin::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: var(--ink-soft);
  }
  .modal .origin .spread { font-weight: 400; color: var(--ink-soft); }
  .modal .desc { font-size: 13.5px; margin-top: 14px; }
  .modal dl {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .modal dt {
    font-weight: 700;
    color: var(--ink);
    font-size: 12px;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .modal dd { margin-bottom: 10px; }
  .modal dd:last-child { margin-bottom: 0; }
  .modal .credit {
    margin-top: 14px;
    font-size: 10.5px;
    color: #b0aca0;
  }
  .modal .close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    font-size: 20px;
    line-height: 1;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 6px;
    z-index: 1;
  }
  .modal .close:hover { color: var(--ink); }
  .modal .close:focus-visible { outline: 2px solid var(--ink); }

  footer {
    text-align: center;
    padding: 64px 24px 80px;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
  }
  footer .small { font-size: 11px; color: #b0aca0; margin-top: 6px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <p class="site-en">A Timeline of Art &amp; Design</p>
  <h1>デザインとアートの年表</h1>
  <p class="lede">中央の年表を挟んで、左に地域ごとの様式・運動、右に生まれ国ごとの作家たちの生涯。上が現在、下へ行くほど過去へさかのぼります。タイルやバーをクリックすると詳細が開きます。</p>
  <div class="filters" id="filters"></div>
  <p class="note">タイルの縦位置はおおよその時代を示します。国のチェックで人物の表示を切り替えられます。</p>
</header>

<div class="chart-outer">
  <div class="chart" id="chart"></div>
</div>

<footer>
  <p>このサイトは学習・整理を目的とした個人プロジェクトです。</p>

</footer>

<div class="overlay" id="overlay">

    <button class="close" id="modal-close" aria-label="閉じる">×</button>
    <div id="modal-body"></div>
  </div>
</div>

/* ============================================================
   描画
   ============================================================ */
const chart = document.getElementById("chart");
const yPos = year => (Y_TOP - year) * S;

/* 国別チェックボックス */
const visible = {};
COUNTRIES.forEach(c => visible[c.id] = true);
const filters = document.getElementById("filters");
COUNTRIES.forEach(c => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" checked data-id="${c.id}"><span class="dot" style="--dot:${c.color}"></span>${c.label}`;
  label.querySelector("input").addEventListener("change", e => {
    visible[c.id] = e.target.checked;
    render();
  });
  filters.appendChild(label);
});

function render() {
  chart.innerHTML = "";
  let maxBottom = yPos(Y_BOTTOM);

  /* --- 左側：様式・運動（地域グループごとにレーン詰め） --- */
  let gx = 0;
  const tiles = []; // 後で描画（幅確定後）
  MV_GROUPS.forEach(group => {
    const items = MOVEMENTS.filter(m => m.region === group.id);
    if (items.length === 0) return;

    const lanes = new Array(group.lanes).fill(-1e9); // 各レーンの最下端
    items.sort((a, b) => b.e - a.e).forEach(m => {
      const tileH = m.img ? TILE_IMG_H : TILE_TXT_H;
      const desired = yPos(m.e);
      /* 押し下げが最小になるレーンを選ぶ */
      let best = 0, bestTop = Infinity;
      lanes.forEach((bottom, i) => {
        const top = Math.max(desired, bottom + 10);
        if (top < bestTop) { bestTop = top; best = i; }
      });
      lanes[best] = bestTop + tileH;
      maxBottom = Math.max(maxBottom, bestTop + tileH);
      tiles.push({ m, x: gx + best * (TILE_W + LANE_GAP), top: bestTop, h: tileH });
    });

    const groupW = group.lanes * (TILE_W + LANE_GAP) - LANE_GAP;
    tiles.push({ head: group.label, x: gx, w: groupW });
    gx += groupW + GROUP_GAP;
  });
  const mvWidth = gx - GROUP_GAP;
  const axisX = mvWidth + 18;

  /* --- 右側：人物（チェックの入った国のみ） --- */
  const peopleStart = axisX + AXIS_W + 20;
  let px = peopleStart;
  const peopleEls = [];
  COUNTRIES.forEach(country => {
    if (!visible[country.id]) return;
    const items = [];
    MOVEMENTS.forEach(m => (m.people || []).forEach(p => {
      if (p.c !== country.id) return;
      const end = p.d ?? NOW;
      items.push({ p, m, top: yPos(end), bottom: yPos(p.b), living: !p.d });
    }));
    if (items.length === 0) return;

    items.sort((a, b) => a.top - b.top);
    const laneBottoms = [];
    items.forEach(it => {
      let lane = laneBottoms.findIndex(b => b + 6 <= it.top);
      if (lane === -1) { lane = laneBottoms.length; laneBottoms.push(0); }
      laneBottoms[lane] = it.bottom;
      it.lane = lane;
    });
    const groupW = laneBottoms.length * P_LANE;

    peopleEls.push({ head: country.label, x: px, w: Math.max(groupW - 3, 22), color: country.color });
    items.forEach(it => {
      peopleEls.push({ ...it, x: px + it.lane * P_LANE, country });
      maxBottom = Math.max(maxBottom, it.bottom);
    });
    px += groupW + G_GAP;
  });
  const totalWidth = px === peopleStart ? axisX + AXIS_W : px;

  /* --- 年グリッド（中央の軸に年ラベル） --- */
  for (let y = Y_TOP; y >= Y_BOTTOM; y -= 25) {
    const isMajor = y % 100 === 0;
    const line = document.createElement("div");
    line.className = "gridline-h" + (isMajor ? " major" : "");
    line.style.top = yPos(y) + "px";
    line.style.left = "0px";
    line.style.width = totalWidth + "px";
    chart.appendChild(line);

    const label = document.createElement("div");
    label.className = "year-label" + (isMajor ? " major" : "");
    label.style.top = yPos(y) + "px";
    label.style.left = axisX + "px";
    label.style.width = AXIS_W + "px";
    label.textContent = y;
    chart.appendChild(label);
  }
  const nowLine = document.createElement("div");
  nowLine.className = "now-line";
  nowLine.style.top = yPos(NOW) + "px";
  nowLine.style.left = "0px";
  nowLine.style.width = totalWidth + "px";
  chart.appendChild(nowLine);
  const nowLabel = document.createElement("div");
  nowLabel.className = "now-label";
  nowLabel.style.top = yPos(NOW) + "px";
  nowLabel.style.left = axisX + "px";
  nowLabel.style.width = AXIS_W + "px";
  nowLabel.textContent = "今";
  chart.appendChild(nowLabel);

  /* --- タイルとヘッダーを描画（グリッドの上に載せる） --- */
  tiles.forEach(t => {
    if (t.head) {
      const head = document.createElement("div");
      head.className = "col-head";
      head.style.left = t.x + "px";
      head.style.width = t.w + "px";
      head.textContent = t.head;
      chart.appendChild(head);
      return;
    }
    const m = t.m;
    const tile = document.createElement("button");
    tile.className = "tile" + (m.img ? "" : " noimg");
    tile.style.left = t.x + "px";
    tile.style.top = t.top + "px";
    tile.style.width = TILE_W + "px";
    tile.style.height = t.h + "px";
    tile.setAttribute("aria-label", `${m.name}の詳細を開く`);
    tile.innerHTML = `
      ${m.img ? `<img src="${wm(m.img)}" alt="" loading="lazy">` : ""}
      <div class="t-name">${m.name}</div>`;
    const img = tile.querySelector("img");
    if (img) img.onerror = () => {
      tile.classList.add("noimg");
      tile.style.height = TILE_TXT_H + "px";
    };
    tile.addEventListener("click", () => openMovement(m));
    chart.appendChild(tile);
  });

  /* --- 人物バーとヘッダー --- */
  peopleEls.forEach(el => {
    if (el.head) {
      const head = document.createElement("div");
      head.className = "col-head country";
      head.style.left = el.x + "px";
      head.style.width = el.w + "px";
      head.style.borderBottomColor = el.color;
      head.textContent = el.head;
      chart.appendChild(head);
      return;
    }
    const { p, m, top, bottom, living, x, country } = el;
    const bar = document.createElement("button");
    bar.className = "p-bar" + (living ? " living" : "");
    bar.style.top = top + "px";
    bar.style.height = (bottom - top) + "px";
    bar.style.left = x + "px";
    bar.style.background = country.color;
    bar.setAttribute("aria-label", `${p.n}（${p.b}–${p.d ?? "存命"}）の詳細を開く`);
    bar.addEventListener("click", () => openPerson(p, m, country));
    chart.appendChild(bar);

    const label = document.createElement("div");
    label.className = "p-label";
    label.style.top = (top + 6) + "px";
    label.style.left = (x + 4.5) + "px";
    label.textContent = p.n;
    chart.appendChild(label);
  });

  chart.style.width = totalWidth + "px";
  chart.style.height = (maxBottom + 20) + "px";
}

/* ============================================================
   詳細モーダル
   ============================================================ */
const overlay = document.getElementById("overlay");
const modalBody = document.getElementById("modal-body");

function showModal(html) {
  modalBody.innerHTML = html;
  const hero = modalBody.querySelector("img.hero");
  if (hero) hero.onerror = () => hero.classList.add("hide");
  overlay.classList.add("show");
  document.getElementById("modal-close").focus();
}

function openMovement(m) {
  showModal(`
    ${m.img ? `<img class="hero" src="${wm(m.img, 640)}" alt="${m.name}の代表的な作品">` : ""}
    <div class="head">
      <span class="nm" id="modal-title">${m.name}</span>
      <span class="en">${m.en}</span>
    </div>
    <div class="period">${m.s}年頃 – ${m.e}年頃</div>
    <div><span class="origin">発祥：${m.origin}${m.spread ? ` <span class="spread">${m.spread}</span>` : ""}</span></div>
    <p class="desc">${m.desc}</p>
    <dl>
      <dt>代表的な人物</dt><dd>${(m.people || []).map(p => p.n).join("、") || "—"}</dd>
      <dt>代表作・事例</dt><dd>${m.works}</dd>
    </dl>
    ${m.img ? `<p class="credit">画像：Wikimedia Commons（パブリックドメイン）</p>` : ""}`);
}

function openPerson(p, m, country) {
  const birthplace = p.nation ?? country.label;
  showModal(`
    ${p.img ? `<img class="hero" src="${wm(p.img, 640)}" alt="${p.n}">` : ""}
    <div class="head">
      <span class="nm" id="modal-title">${p.n}</span>
      <span class="en">${p.b} – ${p.d ?? ""}</span>
    </div>
    <div><span class="origin">生まれ：${birthplace}</span></div>
    <dl>
      <dt>関連する様式・運動</dt><dd>${m.name}（${m.en}）</dd>
      <dt>代表作</dt><dd>${p.work}</dd>
    </dl>
    ${p.img ? `<p class="credit">画像：Wikimedia Commons（パブリックドメイン）</p>` : ""}`);
}

function closeModal() { overlay.classList.remove("show"); }
document.getElementById("modal-close").addEventListener("click", closeModal);
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

render();
</script>
